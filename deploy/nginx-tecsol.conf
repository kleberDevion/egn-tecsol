# Nginx: um servidor, três sites + a API.
# Trocar os `server_name` pelos domínios reais (ou usar o IP enquanto não há
# domínio). O certbot cuida do HTTPS depois — ver deploy/README.md.

# ------------------------------------------------------------------ API
server {
    listen 80;
    server_name api.tecsolengenharia.com.br;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO precisa de upgrade pra websocket.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}

# ------------------------------------------- App de indicações (tp-app, SSR)
server {
    listen 80;
    server_name parceiros.tecsolengenharia.com.br;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ------------------------------------------------------- CRM (site estático)
server {
    listen 80;
    server_name crm.tecsolengenharia.com.br;
    root /opt/tecsol/egn-tecsol/crm/dist;
    index index.html;

    # SPA: qualquer rota cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ------------------------------------------ Site institucional (estático)
server {
    listen 80;
    server_name tecsolengenharia.com.br www.tecsolengenharia.com.br;
    root /opt/tecsol/site-tecsol/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
